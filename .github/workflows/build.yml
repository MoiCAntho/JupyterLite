name: Build JupyterLite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyterlite jupyterlite-xeus jupyter-server jupyterlab_server
          pip install jupyterlab-open-url-parameter

      - name: Install micromamba
        run: |
          mkdir -p ~/.local/bin
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest \
            | tar -xvj -C ~/.local/bin --strip-components=1 bin/micromamba
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          micromamba --version

      - name: Set mamba root
        run: |
          echo "MAMBA_ROOT_PREFIX=$HOME/mamba-root" >> $GITHUB_ENV
          mkdir -p "$HOME/mamba-root"

      - name: Build base JupyterLite
        working-directory: jupyterlite
        run: |
          python -m jupyterlite build . \
            --XeusAddon.environment_file=environment.yml

      - name: Create restrictive student app
        run: |
          rm -rf jupyterlite/_output/lab-eleves
          cp -r jupyterlite/_output/lab jupyterlite/_output/lab-eleves
      
          python - <<'PY'
          import json
          from pathlib import Path
      
          p = Path("jupyterlite/_output/lab-eleves/jupyter-lite.json")
          data = json.loads(p.read_text(encoding="utf-8"))
      
          cfg = data.setdefault("jupyter-config-data", {})
          disabled = cfg.setdefault("disabledExtensions", [])
      
          ext = "@jupyterlab/filebrowser-extension:widget"
          if ext not in disabled:
              disabled.append(ext)
      
          cfg["workspacesStorageName"] = "JupyterLite Eleves Storage"
      
          p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          PY
      
          echo "===== lab-eleves/jupyter-lite.json ====="
          cat jupyterlite/_output/lab-eleves/jupyter-lite.json

      - name: Copy static notebooks into generated site
        run: |
          mkdir -p jupyterlite/_output/docs/notebooks
          if [ -d docs/notebooks ]; then
            cp -r docs/notebooks/. jupyterlite/_output/docs/notebooks/
          else
            echo "No docs/notebooks directory found."
          fi

          echo "===== copied docs/notebooks ====="
          find jupyterlite/_output/docs/notebooks -maxdepth 4 -type f || true

      - name: Show generated tree
        run: |
          echo "===== output root ====="
          find jupyterlite/_output -maxdepth 2 -type d | sort

      - name: Upload generated site
        uses: actions/upload-artifact@v4
        with:
          name: jupyterlite-site
          path: jupyterlite/_output
