name: Build JupyterLite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JupyterLite
        run: |
          pip install --upgrade pip
          pip install jupyterlite jupyterlite-xeus jupyter-server jupyterlab_server

      - name: Install micromamba
        run: |
          mkdir -p ~/.local/bin
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest \
            | tar -xvj -C ~/.local/bin --strip-components=1 bin/micromamba
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          micromamba --version

      - name: Set mamba root
        run: |
          echo "MAMBA_ROOT_PREFIX=$HOME/mamba-root" >> $GITHUB_ENV
          mkdir -p "$HOME/mamba-root"

      - name: Copy private notebooks into JupyterLite source
        run: |
          rm -rf jupyterlite/_notebooks
          mkdir -p jupyterlite/_notebooks
          if [ -d files ]; then
            cp -r files/. jupyterlite/_notebooks/
          else
            echo "No root files directory found, skipping custom content copy."
          fi
          echo "Contents copied into jupyterlite/_notebooks:"
          find jupyterlite/_notebooks -maxdepth 4 -type f || true
          
      - name: Build JupyterLite
        working-directory: jupyterlite
        run: |
          python -m jupyterlite build . \
            --XeusAddon.environment_file=environment.yml

      - name: Upload site
        uses: actions/upload-artifact@v4
        with:
          name: jupyterlite-site
          path: jupyterlite/_output
