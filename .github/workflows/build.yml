name: Build JupyterLite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyterlite jupyterlite-xeus jupyter-server jupyterlab_server
          pip install jupyterlab-open-url-parameter

      - name: Install micromamba
        run: |
          mkdir -p ~/.local/bin
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest \
            | tar -xvj -C ~/.local/bin --strip-components=1 bin/micromamba
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          micromamba --version

      - name: Set mamba root
        run: |
          echo "MAMBA_ROOT_PREFIX=$HOME/mamba-root" >> $GITHUB_ENV
          mkdir -p "$HOME/mamba-root"

      - name: Build base JupyterLite
        working-directory: jupyterlite
        run: |
          python -m jupyterlite build . \
            --XeusAddon.environment_file=environment.yml

      - name: Create restrictive student app
        run: |
          rm -rf jupyterlite/_output/lab-eleves
          cp -r jupyterlite/_output/lab jupyterlite/_output/lab-eleves

          cat > jupyterlite/_output/lab-eleves/jupyter-lite.json <<'EOF'
          {
            "jupyter-lite-schema-version": 0,
            "jupyter-config-data": {
              "disabledExtensions": [
                "@jupyterlab/filebrowser-extension"
              ],
              "workspacesStorageName": "JupyterLite Eleves Storage"
            }
          }
          EOF

      - name: Show generated tree
        run: |
          echo "===== output root ====="
          find jupyterlite/_output -maxdepth 2 -type d | sort
          echo "===== restrictive app config ====="
          cat jupyterlite/_output/lab-eleves/jupyter-lite.json

      - name: Upload generated site
        uses: actions/upload-artifact@v4
        with:
          name: jupyterlite-site
          path: jupyterlite/_output
