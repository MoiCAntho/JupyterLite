name: Build JupyterLite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JupyterLite
        run: |
          pip install --upgrade pip
          pip install jupyterlite jupyterlite-xeus

      - name: Build JupyterLite
        working-directory: jupyterlite
        run: |
          python -m jupyterlite build . \
            --XeusAddon.environment_file=environment.yml

      - name: Upload site
        uses: actions/upload-artifact@v4
        with:
          name: jupyterlite-site
          path: jupyterlite/_output
