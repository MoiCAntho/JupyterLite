name: Build JupyterLite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyterlite jupyterlite-xeus jupyter-server jupyterlab_server
          pip install jupyterlab-open-url-parameter

      - name: Install micromamba
        run: |
          mkdir -p ~/.local/bin
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest \
            | tar -xvj -C ~/.local/bin --strip-components=1 bin/micromamba
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          micromamba --version

      - name: Set mamba root
        run: |
          echo "MAMBA_ROOT_PREFIX=$HOME/mamba-root" >> $GITHUB_ENV
          mkdir -p "$HOME/mamba-root"

      - name: Prepare build folders
        run: |
          rm -rf build-general build-eleves site
          mkdir -p build-general build-eleves site/jupyterlite site/jupyterlite-eleves

          cp -r jupyterlite/. build-general/
          cp -r jupyterlite/. build-eleves/

      - name: Ensure config files exist
        run: |
          if [ ! -f build-general/jupyter_lite_config.json ]; then
            echo "{}" > build-general/jupyter_lite_config.json
          fi

          if [ ! -f build-eleves/jupyter_lite_config.json ]; then
            echo "{}" > build-eleves/jupyter_lite_config.json
          fi

      - name: Build general version
        working-directory: build-general
        run: |
          python -m jupyterlite build . \
            --XeusAddon.environment_file=environment.yml

      - name: Build student version
        working-directory: build-eleves
        run: |
          python -m jupyterlite build . \
            --XeusAddon.environment_file=environment.yml

      - name: Configure general version storage
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("build-general/_output/lab/jupyter-lite.json")
          data = json.loads(p.read_text(encoding="utf-8"))

          cfg = data.setdefault("jupyter-config-data", {})
          cfg["workspacesStorageName"] = "JupyterLite General Workspaces"
          cfg["contentsStorageName"] = "JupyterLite General Contents"

          p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Configure restrictive student version
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("build-eleves/_output/lab/jupyter-lite.json")
          data = json.loads(p.read_text(encoding="utf-8"))

          cfg = data.setdefault("jupyter-config-data", {})

          disabled = cfg.setdefault("disabledExtensions", [])
          ext = "@jupyterlab/filebrowser-extension:widget"
          if ext not in disabled:
              disabled.append(ext)

          cfg["workspacesStorageName"] = "JupyterLite Eleves Workspaces"
          cfg["contentsStorageName"] = "JupyterLite Eleves Contents"
          cfg["enableMemoryStorage"] = True
          cfg["contentsStorageDrivers"] = ["memoryStorageDriver"]

          p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Rename student lab app to lab-eleves
        run: |
          rm -rf build-eleves/_output/lab-eleves
          mv build-eleves/_output/lab build-eleves/_output/lab-eleves

      - name: Copy static notebooks into both generated sites
        run: |
          mkdir -p build-general/_output/docs/notebooks
          mkdir -p build-eleves/_output/docs/notebooks

          if [ -d docs/notebooks ]; then
            cp -r docs/notebooks/. build-general/_output/docs/notebooks/
            cp -r docs/notebooks/. build-eleves/_output/docs/notebooks/
          else
            echo "No docs/notebooks directory found."
          fi

      - name: Assemble final artifact
        run: |
          cp -r build-general/_output/. site/jupyterlite/
          cp -r build-eleves/_output/. site/jupyterlite-eleves/

      - name: Show final tree
        run: |
          echo "===== GENERAL ====="
          find site/jupyterlite -maxdepth 2 -type d | sort
          echo "===== ELEVES ====="
          find site/jupyterlite-eleves -maxdepth 2 -type d | sort
          echo "===== NOTEBOOKS GENERAL ====="
          find site/jupyterlite/docs/notebooks -maxdepth 3 -type f || true
          echo "===== NOTEBOOKS ELEVES ====="
          find site/jupyterlite-eleves/docs/notebooks -maxdepth 3 -type f || true
          echo "===== GENERAL LAB CONFIG ====="
          cat site/jupyterlite/lab/jupyter-lite.json || true
          echo "===== ELEVES LAB CONFIG ====="
          cat site/jupyterlite-eleves/lab-eleves/jupyter-lite.json || true

      - name: Upload generated site
        uses: actions/upload-artifact@v4
        with:
          name: jupyterlite-site
          path: site
